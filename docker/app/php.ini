; MPC e-Tender — local dev PHP overrides.
;
; Mounted into the container at /etc/php/8.4/cli/conf.d/99-mpc.ini
; (compose.yaml `volumes:` block on the app and app-horizon services).
; Sail's runtime already configures opcache + sane defaults for dev;
; this file only adds the deltas we need.

; ── Upload limits ────────────────────────────────────────────────
; POLICY-01 caps file uploads at 5 MB at the FormRequest layer (see
; app/Rules/PdfFile.php). PHP's defaults are 2M post_max_size and
; 2M upload_max_filesize — too low. Raise both to 10M so the
; server-side validator can return its own "5 MB exceeded" error
; instead of PHP truncating the request and producing a confusing
; 413/empty-body failure.
upload_max_filesize = 10M
post_max_size = 10M
max_file_uploads = 20

; ── Memory + execution ───────────────────────────────────────────
memory_limit = 512M
max_execution_time = 120

; ── Timezone ─────────────────────────────────────────────────────
date.timezone = UTC
